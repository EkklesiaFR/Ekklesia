name: CI

on:
  pull_request:
  push:
    branches: [main, dev]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Tests + Build
        env:
          PV_SALT: test_salt_for_ci_only_aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
          NEXT_PUBLIC_APP_URL: http://localhost:3000
        run: |
          npm run lint
          npm run typecheck
          npm test
          npm run build
